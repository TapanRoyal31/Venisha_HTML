<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practical Form Preview</title>
</head>
<body>
    <h2>Practical Form Preview</h2>
    <fieldset>
        <legend>Practical Form</legend>
        <form action="">
            <label for="fullname">Full Name:</label>
            <br>
            <input type="text" name="" id="fullname" placeholder="Enter your full name">
            <br>
            <br>
            <label for="email">Email :</label>
            <br>
            <input type="email" name="" id="email" placeholder="Enter your email">
            <br>
            <br>
            <label for="pass">Password:</label>
            <br>
            <input type="password" name="" id="pass" placeholder="Enter your password">
            <br>
            <br>
            <label for="">Prefered Contact Method:</label>
            <br>
            <input type="radio" name="contact" id="emailr">
            <label for="emailr">Email</label>
            <br>
            <input type="radio" name="contact" id="phone">
            <label for="phone">Phone</label>
            <br>
            <br>
            <label for="">Areas of Interest:</label>
            <br>
            <input type="checkbox" name="Interest" id="news">
            <label for="news">News</label>
            <br>
            <input type="checkbox" name="Interest" id="Updates">
            <label for="Updates">Updates</label>
            <br>
            <input type="checkbox" name="Interest" id="offers">
            <label for="offers">Special offers</label>
            <br>
            <br>
            <button type="submit">Submit</button>
        </form>
    </fieldset>
</body>
</html>
