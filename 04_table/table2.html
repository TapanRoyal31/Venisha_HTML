<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <table height="400" width="650" border="2" align="center">
        <tr>
            <td colspan="2" rowspan="1">Cell 1</td>
            <td rowspan="1" colspan="1">Cell 2</td>
            <td rowspan="1" colspan="1">cell 3</td>
        </tr>
        <tr>
            <td rowspan="3" colspan="1">Cell 4</td>
            <td rowspan="1" colspan="1">Cell 5</td>
            <td rowspan="1" colspan="1">Cell 6</td>
            <td rowspan="1" colspan="1">Cell 7</td>
        </tr>
        <tr>
            <td colspan="3" rowspan="1">Cell 8</td>
        </tr>
        <tr>
            <td rowspan="1" colspan="1">Cell 9</td>
            <td rowspan="1" colspan="2">Cell 10</td>
        </tr>
    </table>
</body>
</html>
